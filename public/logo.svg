<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Z gradient - cyan to blue -->
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Claw gradient - electric blue to purple -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow for accent -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="url(#bgGrad)" stroke="#00f5ff" stroke-width="2" opacity="0.9"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  
  <!-- Main Z letter - stylized -->
  <g filter="url(#glow)">
    <!-- Z top horizontal -->
    <path d="M120 150 L320 150 L320 170 L160 170 L320 330 L320 350 L120 350 L120 330 L280 330 L120 170 Z" 
          fill="url(#zGrad)" />
    
    <!-- Z diagonal accent line -->
    <path d="M140 180 L300 320" 
          stroke="#00f5ff" 
          stroke-width="3" 
          stroke-linecap="round"
          opacity="0.6" />
  </g>
  
  <!-- Claw marks extending from Z -->
  <g filter="url(#strongGlow)">
    <!-- Claw mark 1 - top right -->
    <path d="M330 130 Q380 100 420 80" 
          stroke="url(#clawGrad)" 
          stroke-width="8" 
          stroke-linecap="round"
          fill="none"/>
    
    <!-- Claw mark 2 - middle right -->
    <path d="M340 200 Q400 180 450 175" 
          stroke="url(#clawGrad)" 
          stroke-width="7" 
          stroke-linecap="round"
          fill="none"/>
    
    <!-- Claw mark 3 - bottom right -->
    <path d="M340 300 Q400 310 440 320" 
          stroke="url(#clawGrad)" 
          stroke-width="6" 
          stroke-linecap="round"
          fill="none"/>
  </g>
  
  <!-- Digital circuit patterns -->
  <g stroke="#00f5ff" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Left side circuit -->
    <path d="M70 200 L90 200 L90 240 L70 240"/>
    <path d="M70 280 L90 280 L90 320 L70 320"/>
    <circle cx="70" cy="200" r="3" fill="#00f5ff"/>
    <circle cx="70" cy="240" r="3" fill="#00f5ff"/>
    <circle cx="70" cy="280" r="3" fill="#00f5ff"/>
    <circle cx="70" cy="320" r="3" fill="#00f5ff"/>
    
    <!-- Bottom circuit -->
    <path d="M200 430 L200 450 L240 450 L240 430"/>
    <path d="M280 430 L280 450 L320 450 L320 430"/>
    <circle cx="200" cy="450" r="3" fill="#00f5ff"/>
    <circle cx="240" cy="450" r="3" fill="#00f5ff"/>
    <circle cx="280" cy="450" r="3" fill="#00f5ff"/>
    <circle cx="320" cy="450" r="3" fill="#00f5ff"/>
  </g>
  
  <!-- Animated pulse dots (decorative) -->
  <circle cx="420" cy="80" r="5" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="175" r="4" fill="#8b5cf6" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="320" r="3" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Z-Claw text -->
  <text x="256" y="410" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="42" 
        font-weight="bold" 
        fill="url(#zGrad)" 
        text-anchor="middle"
        filter="url(#glow)">
    Z-CLAW
  </text>
  
  <!-- Tagline -->
  <text x="256" y="445" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="14" 
        fill="#6366f1" 
        text-anchor="middle"
        letter-spacing="4"
        opacity="0.8">
    AI AGENT SYSTEM
  </text>
</svg>